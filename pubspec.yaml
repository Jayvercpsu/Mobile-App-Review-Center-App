name: app_review_center
description: Board Master Review Center mobile application
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  http: ^1.2.2
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  smooth_page_indicator: ^1.2.0+3
  intl: ^0.19.0
  url_launcher: ^6.3.1
  webview_flutter: ^4.7.0
  image_picker: ^1.1.2
  connectivity_plus: ^6.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/boardmaster.png
    - assets/images/boardmaster-square.png
